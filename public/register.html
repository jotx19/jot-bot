<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · tinyjot</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z" />
            <path d="M20 3v4" /><path d="M22 5h-4" /><path d="M4 17v2" /><path d="M5 18H3" />
          </svg>
        </span>
        <h1>tiny<span>jot</span></h1>
      </div>
      <p class="auth-subtitle">Create your personal assistant account</p>

      <form class="auth-form" id="form">
        <label class="auth-label" for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          class="auth-input"
          autocomplete="username"
          required
          minlength="3"
          maxlength="32"
          pattern="[A-Za-z0-9_]+"
          placeholder="username"
          autofocus
        />

        <label class="auth-label" for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          class="auth-input"
          autocomplete="new-password"
          required
          minlength="6"
          placeholder="password"
        />

        <p id="msg" class="auth-error" role="alert" hidden></p>

        <button type="submit" class="auth-submit" id="submit">Register</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const submit = document.getElementById('submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submit.disabled = true;
      msg.hidden = true;
      msg.textContent = '';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Register failed');
        location.href = '/settings.html';
      } catch (err) {
        msg.textContent = err.message;
        msg.hidden = false;
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
