services:
  - type: web
    name: qwen-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: MONGODB_URI
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
